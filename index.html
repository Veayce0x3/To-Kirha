<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>To-Kirha 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://esm.sh" crossorigin>
  <link rel="preconnect" href="https://jmakrpkocxlyykgfnmlv.supabase.co" crossorigin>
  <link rel="dns-prefetch" href="https://esm.sh">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="./asset%20to-kirha/icone%20application%20/icone%20application.jpg" type="image/jpeg">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./asset%20to-kirha/icone%20application%20/icone%20application.jpg">
  <meta name="theme-color" content="#9B59B6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="To-Kirha">
  <style id="boot-splash-style">
    #boot-splash {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.75rem; padding: 1.5rem; text-align: center;
      background: #F8E8EE; color: #4A3728;
      font-family: "Zen Maru Gothic", system-ui, sans-serif;
    }
    #boot-splash[hidden] { display: none !important; }
    #boot-splash .boot-title { font-size: 1.25rem; font-weight: 700; }
    #boot-splash .boot-msg { font-size: 0.95rem; opacity: 0.85; max-width: 18rem; }
  </style>
  <script>
    /**
     * Bootstrap mobile-first : détecte une nouvelle build via balance.json
     * et force un hard refresh (caches + reload) sans action manuelle.
     * Puis charge CSS + main.js avec ?v=appBuildId (anti-cache Safari).
     */
    (function () {
      var LS_BUILD = 'tokirha_last_build';
      var SS_JUST = 'tokirha_just_refreshed';
      var splash = null;

      function ensureSplash(msg) {
        splash = document.getElementById('boot-splash');
        if (!splash) {
          splash = document.createElement('div');
          splash.id = 'boot-splash';
          splash.innerHTML = '<div class="boot-title">To-Kirha</div><div class="boot-msg" id="boot-splash-msg"></div>';
          (document.body || document.documentElement).appendChild(splash);
        }
        var m = document.getElementById('boot-splash-msg');
        if (m) m.textContent = msg || 'Chargement…';
        splash.hidden = false;
      }

      function hideSplash() {
        var el = document.getElementById('boot-splash');
        if (el) el.hidden = true;
      }

      function cameFromRefresh() {
        try {
          var url = new URL(location.href);
          if (url.searchParams.has('tokirha_refresh') || url.searchParams.has('_cb')) return true;
          if (sessionStorage.getItem(SS_JUST) === '1') return true;
        } catch (e) {}
        return false;
      }

      function clearCachesThen(done) {
        var finished = false;
        function finish() {
          if (finished) return;
          finished = true;
          done();
        }
        var tasks = [];
        try {
          if ('caches' in window) {
            tasks.push(caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            }));
          }
        } catch (e) {}
        try {
          if ('serviceWorker' in navigator) {
            tasks.push(navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            }));
          }
        } catch (e) {}
        Promise.allSettled(tasks.length ? tasks : [Promise.resolve()]).then(finish, finish);
        setTimeout(finish, 1500);
      }

      var reloadOnce = false;
      function hardReload() {
        if (reloadOnce) return;
        reloadOnce = true;
        try { sessionStorage.setItem(SS_JUST, '1'); } catch (e) {}
        ensureSplash('Mise à jour en cours…');
        clearCachesThen(function () {
          var url = new URL(location.href);
          url.searchParams.delete('tokirha_refresh');
          url.searchParams.delete('_cb');
          url.searchParams.delete('v');
          url.searchParams.delete('_');
          var bust = String(Date.now());
          url.searchParams.set('_cb', bust);
          url.searchParams.set('tokirha_refresh', bust);
          location.replace(url.toString());
        });
      }

      function injectStyles(buildId) {
        [
          './css/main.css',
          './css/layout.css',
          './css/online.css'
        ].forEach(function (href) {
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = href + '?v=' + encodeURIComponent(buildId);
          document.head.appendChild(link);
        });
      }

      function injectMain(buildId) {
        var pre = document.createElement('link');
        pre.rel = 'modulepreload';
        pre.href = './js/main.js?v=' + encodeURIComponent(buildId);
        document.head.appendChild(pre);

        var s = document.createElement('script');
        s.type = 'module';
        s.src = './js/main.js?v=' + encodeURIComponent(buildId);
        s.onerror = function () {
          ensureSplash('Échec de chargement — nouvel essai…');
          hardReload();
        };
        document.body.appendChild(s);
      }

      function startApp(buildId) {
        injectStyles(buildId);
        injectMain(buildId);
        // Le splash disparaît dès que le jeu est prêt (main.js)
        window.__tokirhaHideBootSplash = hideSplash;
        // Sécurité : cacher après 8 s même si init lente
        setTimeout(hideSplash, 8000);
      }

      function boot() {
        ensureSplash('Chargement…');
        var fromRefresh = cameFromRefresh();
        fetch('./data/balance.json?_=' + Date.now(), {
          cache: 'no-store',
          credentials: 'same-origin'
        })
          .then(function (r) {
            if (!r.ok) throw new Error('balance ' + r.status);
            return r.json();
          })
          .then(function (balance) {
            var current = (balance && (balance.appBuildId || String(balance.saveVersion || 'dev'))) || 'dev';
            var last = null;
            try { last = localStorage.getItem(LS_BUILD); } catch (e) {}

            if (!fromRefresh && last && last !== current) {
              hardReload();
              return;
            }

            if (fromRefresh || !last) {
              try {
                localStorage.setItem(LS_BUILD, current);
                sessionStorage.setItem(SS_JUST, '1');
              } catch (e) {}
            }

            // Nettoyer l’URL après un refresh auto
            if (fromRefresh) {
              try {
                var url = new URL(location.href);
                if (url.searchParams.has('tokirha_refresh') || url.searchParams.has('_cb')) {
                  url.searchParams.delete('tokirha_refresh');
                  url.searchParams.delete('_cb');
                  url.searchParams.delete('v');
                  url.searchParams.delete('_');
                  var clean = url.pathname + (url.searchParams.toString() ? '?' + url.searchParams : '') + url.hash;
                  history.replaceState({}, '', clean);
                }
              } catch (e) {}
            }

            startApp(current);
          })
          .catch(function () {
            // Réseau / cache : tenter quand même avec un bust temporel
            startApp(String(Date.now()));
          });
      }

      if (document.body) boot();
      else document.addEventListener('DOMContentLoaded', boot);
    })();
  </script>
</head>
<body>
  <div id="boot-splash" aria-live="polite">
    <div class="boot-title">To-Kirha</div>
    <div class="boot-msg" id="boot-splash-msg">Chargement…</div>
  </div>

  <div class="sakura-bg"></div>
  <div class="sakura-petals" id="sakura-petals"></div>
  <div class="level-flash" id="level-flash"></div>

  <div class="app-shell">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img class="brand-logo" src="./asset%20to-kirha/icone%20application%20/icone%20application.jpg" alt="" width="36" height="36" />
        <span class="brand-title">To-Kirha</span>
        <span class="season-badge" id="season-badge">Saison 1</span>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer" id="sidebar-footer"></div>
    </aside>

    <div class="main-area">
      <header class="top-bar">
        <div id="global-banners" class="global-banners hidden" aria-live="polite"></div>
        <button class="burger-btn" id="burger-btn" type="button" aria-label="Menu">☰</button>
        <button class="top-quick-btn top-quick-options" id="quick-options" type="button" title="Options" aria-label="Options">
          <img class="quick-btn-icon" src="./asset%20to-kirha/divers%20icone/parametre_transparent.png" alt="" />
        </button>
        <div class="top-bar-left">
          <h1 class="view-title" id="view-title">Personnage</h1>
          <span class="top-zone" id="zone-subtitle">Village Sakura</span>
        </div>
        <div class="top-bar-right">
          <button type="button" class="season-bonus-chip" id="season-bonus-chip" hidden title="Bonus de saison — ouvrir Saison" aria-label="Bonus de saison"></button>
          <button type="button" class="season-boost-chip" id="season-boost-chip" hidden title="Boost de relance" aria-label="Boost de relance"></button>
          <button class="top-scroll-btn" id="quick-scroll" type="button" title="Parchemins des Anciens — Place marchande">
            <span id="scroll-amount">0</span>
            <img class="scroll-icon" src="./asset%20to-kirha/divers%20icone/parchemin%20ancien%20transparent.png" alt="" width="22" height="22" />
          </button>
          <div class="top-nugget-chip" title="Pépites d'or">
            <span id="gold-nugget-amount">0</span>
            <img class="nugget-icon" src="./asset%20to-kirha/pepites%20d_or/pepite_150_transparent.png" alt="" width="22" height="22" />
          </div>
          <span class="kirha-amount" id="kirha-amount">0</span>
          <img class="kirha-icon" src="./asset%20to-kirha/divers%20icone/token_transparent.png" alt="Kirha" width="28" height="28" />
        </div>
      </header>

      <div class="content-wrapper">
        <main class="view-container" id="view-container"></main>
      </div>
      <nav class="job-switcher-dock hidden" id="job-switcher-dock" aria-label="Changer de métier"></nav>
    </div>
  </div>

  <footer class="footer">To-Kirha v0.6.0</footer>

  <div class="modal-overlay" id="career-choice-modal">
    <div class="modal modal-career">
      <div id="career-choice-body"></div>
    </div>
  </div>

  <div class="modal-overlay" id="whats-new-modal" aria-hidden="true">
    <div class="modal modal-whats-new">
      <h2 id="whats-new-title">✨ Nouveautés</h2>
      <p class="modal-desc" id="whats-new-desc">Voici ce qui a changé dans cette version.</p>
      <p class="startup-refresh-version" id="whats-new-version"></p>
      <div class="whats-new-body" id="whats-new-body"></div>
      <div class="modal-actions modal-actions-refresh">
        <button class="btn btn-prestige" id="whats-new-confirm" type="button">Compris</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="offline-modal">
    <div class="modal">
      <h2>🌸 Bon retour !</h2>
      <p class="modal-duration" id="offline-duration"></p>
      <div class="modal-gains" id="offline-gains"></div>
      <p class="modal-cap" id="offline-cap"></p>
      <button class="btn btn-modal-close" id="offline-close">Continuer</button>
    </div>
  </div>

  <div class="modal-overlay" id="prestige-modal">
    <div class="modal modal-prestige">
      <h2>🌸 Nouvelle Saison</h2>
      <p class="modal-desc">La Saison <span id="prestige-modal-next-season"></span> commence. Tu gardes tes bonus permanents.</p>
      <div class="prestige-gains" id="prestige-gains"></div>
      <div class="modal-actions">
        <button class="btn btn-modal-cancel" id="prestige-cancel">Annuler</button>
        <button class="btn btn-prestige" id="prestige-confirm">Commencer</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="item-modal">
    <div class="modal modal-item" id="item-modal-body"></div>
  </div>

  <div class="modal-overlay" id="dungeon-combat-modal">
    <div class="modal modal-combat" id="dungeon-combat-body"></div>
  </div>

  <div class="modal-overlay" id="dungeon-result-modal">
    <div class="modal" id="dungeon-result-body"></div>
  </div>

  <div class="toasts" id="toasts"></div>

  <div class="picker-sheet-backdrop" id="picker-sheet-backdrop"></div>
  <div id="picker-sheet-portal"></div>

  <div class="modal-overlay" id="auth-modal">
    <div class="modal modal-auth">
      <div id="auth-modal-body"></div>
    </div>
  </div>

  <script>
    /* Nettoyage d’anciens artefacts de cache (popup refresh / pull-to-refresh) */
    (function () {
      try {
        document.documentElement.classList.remove('startup-refresh-pending');
        document.addEventListener('DOMContentLoaded', function () {
          document.body.classList.remove('startup-refresh-pending', 'career-choice-pending');
          var old = document.getElementById('startup-refresh-modal');
          if (old) old.remove();
          document.querySelectorAll('.top-pull-refresh, .bottom-pull-refresh').forEach(function (el) {
            el.remove();
          });
        });
      } catch (e) {}
    })();
  </script>
</body>
</html>

  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;padding:16px;font:14px monospace;z-index:9999;white-space:pre-wrap;word-break:break-all;max-height:50vh;overflow:auto;';
        d.textContent = '🔴 ERREUR: ' + (e.message || e.type) + '\nSource: ' + (e.filename || '') + ':' + (e.lineno || '') + '\n' + ((e.error && e.error.stack) || '');
        document.body.appendChild(d);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#900;color:#fff;padding:16px;font:14px monospace;z-index:9999;white-space:pre-wrap;word-break:break-all;max-height:50vh;overflow:auto;';
        d.textContent = '🔴 PROMISE REJETÉE: ' + (e.reason || e);
        document.body.appendChild(d);
      });
    </script>
  </body>

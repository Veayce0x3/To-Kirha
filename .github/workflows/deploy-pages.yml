# Déploiement GitHub Pages : prod (main) + preview overhaul (/overhaul/).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, cursor/game-overhaul-3b9c]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url }}
    steps:
      - name: Checkout main (prod)
        uses: actions/checkout@v4
        with:
          ref: main
          path: site

      - name: Checkout overhaul (preview)
        uses: actions/checkout@v4
        with:
          ref: cursor/game-overhaul-3b9c
          path: site/overhaul

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy (tentative 1)
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Pause avant retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20

      - name: Deploy (tentative 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Pause avant dernier essai
        if: steps.deploy2.outcome == 'failure'
        run: sleep 20

      - name: Deploy (tentative 3)
        id: deploy3
        if: steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Vérifier le déploiement
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure' && steps.deploy3.outcome == 'failure'
        run: |
          echo "::error::Déploiement GitHub Pages échoué après 3 tentatives."
          exit 1
